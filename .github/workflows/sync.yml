name: X to Discord Sync

on:
  schedule:
    - cron: "*/5 * * * *"   # 每 5 分鐘跑一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install feedparser requests

      - name: Run sync
        env:
          RSS_URL: "https://rsshub.app/twitter/user/HomesickVtuber"
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python sync.py

      - name: Commit state
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update last tweet id"
            git push
          fi
